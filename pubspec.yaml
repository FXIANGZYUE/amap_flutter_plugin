name: amap_flutter_plugin
description: A Flutter plugin for Amap (高德地图) with route planning, POI search, and map display.
version: 1.0.0
homepage: https://github.com/FXIANGZYUE/amap_flutter_plugin

environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: com.example.amap_flutter_plugin
        pluginClass: AmapFlutterPlugin
